repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: ^(src/guga_perception/terrain_analysis|src/guga_controller/pb_omni_pid_pursuit_controller|src/guga_decision/simple_decision)/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$

      - id: test-terrain-analysis
        name: test terrain_analysis
        entry: scripts/test/test_terrain_analysis_coverage.sh
        language: system
        pass_filenames: false
        files: ^src/guga_perception/terrain_analysis/.*$

      - id: test-pid-controller
        name: test pid controller
        entry: scripts/pre-commit/run_pid_tests.sh
        language: system
        pass_filenames: false
        files: ^src/guga_controller/pb_omni_pid_pursuit_controller/.*$

      - id: test-simple-decision
        name: test simple_decision
        entry: scripts/test/test_simple_decision_coverage.sh
        language: system
        pass_filenames: false
        files: ^src/guga_decision/simple_decision/.*$
