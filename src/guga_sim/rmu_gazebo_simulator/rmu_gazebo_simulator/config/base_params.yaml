/**:
  ros__parameters:
    world_name: "default"
    use_odometry: true
    odometry_publisher:
      frame_id: "odom"
      child_frame_id: "base_footprint"
      publish_tf: true
      use_footprint: true
      rate: 30
    chassis_controller:
      follow_yaw: true
      follow_yaw_pid:
        p: 5.0
        i: 0.0
        d: 1.0
        imin: -1.0
        imax: 1.0
        cmdmin: -1000.0
        cmdmax: 1000.0
    gimbal_controller:
      pitch_pid:
        p: 10.0
        i: 0.1
        d: 1.0
        imin: -1.0
        imax: 1.0
        cmdmin: -1000.0
        cmdmax: 1000.0
      yaw_pid:
        p: 10.0
        i: 0.0
        d: 1.0
        imin: -0.2
        imax: 0.2
        cmdmin: -1000.0
        cmdmax: 1000.0
